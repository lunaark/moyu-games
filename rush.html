<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>下班冲刺</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #eef2f8;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Courier New", monospace;
    overflow: hidden;
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border: 4px solid #c9d6ea;
    border-radius: 4px;
    max-width: 100vw;
    max-height: 100vh;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// ============ 基础 ============
const LW = 320, LH = 200;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
function fit() {
  const scale = Math.max(1, Math.floor(Math.min(
    window.innerWidth * 0.96 / LW, window.innerHeight * 0.96 / LH)));
  canvas.width = LW; canvas.height = LH;
  canvas.style.width = LW * scale + 'px';
  canvas.style.height = LH * scale + 'px';
  ctx.imageSmoothingEnabled = false;
}
fit();
window.addEventListener('resize', fit);

const C = {
  ink: '#1e293b', bg: '#eef2f8', wall: '#e3eaf5', wallLight: '#d5e0f0', floor: '#d7e3f4',
  floorTop: '#2563eb', skin: '#ffd29b', hair: '#1f2937', shirt: '#2563eb',
  pants: '#475569', bag: '#ef4444', chair: '#64748b', chairSeat: '#94a3b8',
  folder: '#f59e0b', folderLine: '#ffffff', coffee: '#a16207', coffeeTop: '#ffffff',
  white: '#f8fafc', gray: '#64748b', gold: '#d97706', danger: '#ef4444',
  green: '#059669', door: '#059669'
};

// ============ 状态（挂 window 便于测试观察） ============
const G = window.game = {
  state: 'title',            // title | play | over
  t: 0,
  speed: 2.2,
  dist: 0,
  coffee: 0,
  best: +(localStorage.getItem('run_best') || 0),
  player: { x: 48, y: 0, vy: 0, onGround: true, sliding: 0, dead: false },
  obstacles: [],             // {type:'chair'|'folder', x, y, w, h}
  items: [],                 // 咖啡 {x, y, w, h}
  spawnTimer: 0,
  popups: []
};
const GROUND = 168;          // 地面 y

function reset() {
  G.state = 'play'; G.t = 0; G.speed = 2.2; G.dist = 0; G.coffee = 0;
  G.player = { x: 48, y: GROUND, vy: 0, onGround: true, sliding: 0, dead: false };
  G.obstacles = []; G.items = []; G.spawnTimer = 0; G.popups = [];
}

// ============ 输入 ============
function jump() {
  if (G.state === 'title') { reset(); return; }
  if (G.state === 'over') { if (G.t > 30) G.state = 'title'; return; }
  const p = G.player;
  if (p.onGround) { p.vy = -5.2; p.onGround = false; p.sliding = 0; }
}
function slide() {
  if (G.state !== 'play') return;
  const p = G.player;
  if (p.onGround) p.sliding = 26;
}
window.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); jump(); }
  if (e.code === 'ArrowDown') { e.preventDefault(); slide(); }
});
// 触屏：上半屏跳，下半屏滑铲；非游戏中任意点击=开始（修复：标题页下半屏点不动）
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (G.state !== 'play') { jump(); return; }
  const rect = canvas.getBoundingClientRect();
  const y = e.touches[0].clientY - rect.top;
  if (y > rect.height * 0.6) slide(); else jump();
}, { passive: false });
canvas.addEventListener('mousedown', e => {
  if (G.state !== 'play') { jump(); return; }
  const rect = canvas.getBoundingClientRect();
  const y = e.clientY - rect.top;
  if (y > rect.height * 0.6) slide(); else jump();
});

// ============ 生成障碍 ============
function spawn() {
  const r = Math.random();
  if (r < 0.45) {
    // 办公椅（跳过）
    G.obstacles.push({ type: 'chair', x: LW + 10, y: GROUND - 22, w: 20, h: 22 });
  } else if (r < 0.75) {
    // 飞来的文件夹（滑铲躲，高度在头部；修复：下调到明确头部高度，站着必撞、铲下必过）
    G.obstacles.push({ type: 'folder', x: LW + 10, y: GROUND - 34, w: 24, h: 12 });
  } else {
    // 咖啡（吃了加分加速）
    G.items.push({ x: LW + 10, y: GROUND - 50 - Math.random() * 30, w: 12, h: 14 });
  }
}

// ============ 更新 ============
function update() {
  G.t++;
  if (G.state !== 'play') return;

  const p = G.player;
  // 重力
  p.vy += 0.28;
  p.y += p.vy;
  if (p.y >= GROUND) { p.y = GROUND; p.vy = 0; p.onGround = true; }
  if (p.sliding > 0) p.sliding--;

  // 距离与提速
  G.dist += G.speed / 10;
  G.speed += 0.0009;

  // 生成
  G.spawnTimer--;
  if (G.spawnTimer <= 0) {
    spawn();
    G.spawnTimer = 55 + Math.random() * 55 - G.speed * 4;
  }

  // 移动障碍/道具
  G.obstacles.forEach(o => o.x -= G.speed);
  G.items.forEach(o => o.x -= G.speed);
  G.obstacles = G.obstacles.filter(o => o.x + o.w > -10);
  G.items = G.items.filter(o => o.x + o.w > -10);

  // 玩家碰撞盒
  const ph = p.sliding > 0 ? 14 : 30;      // 滑铲时变矮
  const box = { x: p.x - 8, y: p.y - ph, w: 18, h: ph };

  // 撞障碍（修复：碰撞盒四周内缩 3px，贴皮不算死，手感宽容）
  for (const o of G.obstacles) {
    const M = 3;
    if (box.x < o.x + o.w - M && box.x + box.w > o.x + M &&
        box.y < o.y + o.h - M && box.y + box.h > o.y + M) {
      p.dead = true;
      G.state = 'over'; G.t = 0;
      if (G.dist > G.best) { G.best = Math.floor(G.dist); localStorage.setItem('run_best', G.best); }
      if (navigator.vibrate) navigator.vibrate(150);
    }
  }
  // 吃咖啡
  for (let i = G.items.length - 1; i >= 0; i--) {
    const o = G.items[i];
    if (box.x < o.x + o.w && box.x + box.w > o.x &&
        box.y < o.y + o.h && box.y + box.h > o.y) {
      G.items.splice(i, 1);
      G.coffee++;
      G.speed += 0.15;
      G.popups.push({ x: o.x, y: o.y, life: 30, txt: '+1杯' });
    }
  }

  G.popups.forEach(q => { q.y -= 0.8; q.life--; });
  G.popups = G.popups.filter(q => q.life > 0);
}

// ============ 绘制 ============
function px(x, y, w, h, c) { ctx.fillStyle = c; ctx.fillRect(x | 0, y | 0, w, h); }
function drawText(s, x, y, size, c, align = 'center') {
  ctx.fillStyle = c;
  ctx.font = `bold ${size}px "Courier New", monospace`;
  ctx.textAlign = align; ctx.textBaseline = 'top';
  ctx.fillText(s, x, y);
}

function drawBG() {
  px(0, 0, LW, LH, C.wall);
  const off = -(G.dist * 4 % 24);
  for (let y = 0; y < GROUND - 30; y += 16)
    for (let x = off + (y / 16 % 2) * 12; x < LW; x += 24)
      px(x, y, 11, 15, C.wallLight);
  // 窗户（视差滚动）
  const woff = -(G.dist * 7 % 140);
  for (let i = -1; i < 4; i++) {
    const wx = woff + i * 140 + 30;
    px(wx, 24, 40, 30, '#0f5aa8');
    px(wx + 3, 27, 15, 11, '#73eff7'); px(wx + 22, 27, 15, 11, '#73eff7');
    px(wx + 3, 41, 15, 10, '#41a6f6'); px(wx + 22, 41, 15, 10, '#41a6f6');
  }
  // 地面
  px(0, GROUND, LW, 3, C.floorTop);
  px(0, GROUND + 3, LW, LH - GROUND, C.floor);
  const foff = -(G.dist * 10 % 28);
  for (let x = foff; x < LW; x += 28) px(x, GROUND + 10, 14, 2, '#c3d0e5');
}

function drawPlayer() {
  const p = G.player;
  const run = (G.t >> 3) % 2;
  if (p.sliding > 0) {
    // 滑铲姿势
    px(p.x - 10, p.y - 12, 26, 8, C.shirt);
    px(p.x + 12, p.y - 16, 12, 12, C.skin);
    px(p.x + 12, p.y - 18, 12, 5, C.hair);
    px(p.x - 14, p.y - 6, 30, 6, C.pants);
    return;
  }
  // 腿（跑动交替）
  if (p.onGround) {
    px(p.x - 6 + (run ? 4 : 0), p.y - 10, 6, 10, C.pants);
    px(p.x + 4 - (run ? 4 : 0), p.y - 10, 6, 10, C.pants);
  } else {
    px(p.x - 8, p.y - 8, 8, 6, C.pants);   // 跳跃收腿
    px(p.x + 4, p.y - 12, 8, 6, C.pants);
  }
  // 身体+背包
  px(p.x - 6, p.y - 24, 16, 14, C.shirt);
  px(p.x - 12, p.y - 22, 6, 10, C.bag);
  // 头
  px(p.x - 4, p.y - 38, 14, 14, C.skin);
  px(p.x - 4, p.y - 41, 14, 6, C.hair);
  px(p.x + 4, p.y - 33, 2, 2, C.ink);
  // 奔跑烟尘
  if (p.onGround && run) px(p.x - 16, p.y - 3, 4, 3, C.gray);
}

function drawObstacles() {
  for (const o of G.obstacles) {
    if (o.type === 'chair') {
      px(o.x + 8, o.y + 12, 4, 10, '#94a3b8');            // 支柱
      px(o.x + 2, o.y + 20, 16, 3, '#94a3b8');            // 底座
      px(o.x, o.y + 4, 20, 8, C.chairSeat);               // 坐垫
      px(o.x + 14, o.y - 8, 6, 14, C.chair);              // 靠背
    } else {
      // 飞行文件夹（扇动）
      const flap = (G.t >> 2) % 2 ? -2 : 0;
      px(o.x, o.y + flap, 24, 12, C.folder);
      px(o.x + 3, o.y + 3 + flap, 18, 2, C.folderLine);
      px(o.x + 3, o.y + 7 + flap, 12, 2, C.folderLine);
    }
  }
  for (const o of G.items) {
    px(o.x, o.y + 3, 12, 11, C.coffee);
    px(o.x + 12, o.y + 5, 3, 5, C.coffee);
    px(o.x + 1, o.y, 10, 3, C.coffeeTop);
    if ((G.t >> 3) % 2) px(o.x + 3, o.y - 5, 2, 3, C.gray); // 热气
  }
}

function drawHUD() {
  drawText('下班距离', 8, 6, 9, C.gray, 'left');
  drawText(Math.floor(G.dist) + 'm', 8, 16, 16, C.gold, 'left');
  drawText('☕x' + G.coffee, LW - 8, 8, 12, C.ink, 'right');
  G.popups.forEach(q => {
    ctx.globalAlpha = Math.min(1, q.life / 15);
    drawText(q.txt, q.x, q.y, 10, C.green);
    ctx.globalAlpha = 1;
  });
}

function draw() {
  drawBG();
  drawObstacles();
  drawPlayer();
  drawHUD();

  if (G.state === 'title') {
    ctx.globalAlpha = 0.78; px(0, 0, LW, LH, C.ink); ctx.globalAlpha = 1;
    drawText('下 班 冲 刺', 160, 40, 22, C.gold);
    drawText('OFF WORK RUSH', 160, 66, 9, C.gray);
    drawText('跳过办公椅 · 滑铲躲文件夹 · 接住咖啡', 160, 92, 10, C.white);
    drawText('上半屏/空格=跳  下半屏/↓=滑铲', 160, 108, 10, C.warn || '#ef7d57');
    if ((G.t >> 4) % 2) drawText('点击开跑', 160, 140, 13, C.green);
    if (G.best > 0) drawText('最远下班距离: ' + G.best + 'm', 160, 164, 9, C.gray);
  }
  if (G.state === 'over') {
    ctx.globalAlpha = 0.8; px(0, 0, LW, LH, C.ink); ctx.globalAlpha = 1;
    drawText('摔了个大跟头', 160, 40, 18, C.danger);
    drawText('下班距离 ' + Math.floor(G.dist) + 'm', 160, 74, 14, C.gold);
    drawText('咖啡 x' + G.coffee, 160, 96, 11, C.white);
    if (Math.floor(G.dist) >= G.best && G.dist > 0) drawText('★ 新纪录 ★', 160, 116, 11, '#ef7d57');
    else drawText('最远纪录: ' + G.best + 'm', 160, 116, 10, C.gray);
    if (G.t > 30 && (G.t >> 4) % 2) drawText('点击再跑一次', 160, 150, 12, C.green);
  }
}

(function loop() { update(); draw(); requestAnimationFrame(loop); })();
</script>
</body>
</html>
