<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>摸鱼快跑</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #eef2f8;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Courier New", monospace;
    overflow: hidden;
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
  }
  #wrap { position: relative; }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border: 4px solid #c9d6ea;
    border-radius: 4px;
    max-width: 100vw;
    max-height: 100vh;
  }
</style>
</head>
<body>
<div id="wrap"><canvas id="game"></canvas></div>
<script>
// ============ 基础设置 ============
const LW = 240, LH = 320;            // 逻辑像素（低分辨率，出像素味）
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function fit() {
  const scale = Math.max(1, Math.floor(Math.min(
    window.innerWidth * 0.96 / LW,
    window.innerHeight * 0.96 / LH
  )));
  canvas.width = LW; canvas.height = LH;
  canvas.style.width = LW * scale + 'px';
  canvas.style.height = LH * scale + 'px';
  ctx.imageSmoothingEnabled = false;
}
fit();
window.addEventListener('resize', fit);

// ============ 调色板（复古像素配色） ============
const C = {
  ink: '#1e293b', bg: '#eef2f8', floor: '#d7e3f4', wall: '#e3eaf5', wallLight: '#d5e0f0',
  desk: '#c99e6e', deskTop: '#e0bb8d', screenOff: '#cbd5e1', screenOn: '#3b82f6',
  skin: '#ffd29b', hair: '#1f2937', shirt: '#2563eb', pants: '#475569',
  bossSuit: '#334155', bossSkin: '#ffd29b', bossHair: '#94a3b8',
  phone: '#ffffff', phoneScr: '#4ade80', danger: '#ef4444', warn: '#f59e0b',
  gold: '#d97706', white: '#f8fafc', gray: '#64748b', green: '#059669'
};

// ============ 游戏状态 ============
const S = { TITLE: 0, PLAY: 1, OVER: 2 };
let state = S.TITLE;
let slacking = false;          // 是否正在摸鱼（按住）
let score = 0, best = +(localStorage.getItem('moyu_best') || 0);
let lives = 3;
let t = 0;                     // 全局帧计数
let shake = 0;                 // 被抓画面抖动
let caughtFlash = 0;           // 被抓红闪
let popups = [];               // 飘分数字

// 老板状态机: work(背对) -> warn(要回头,预警) -> watch(盯着你)
let boss = { state: 'work', timer: 0, next: 180 };

function resetBoss() {
  boss.state = 'work';
  boss.timer = 0;
  // 难度随分数提高：老板回头越来越频繁
  const base = Math.max(70, 200 - score / 12);
  boss.next = base + Math.random() * base;
}
function startGame() {
  score = 0; lives = 3; t = 0; slacking = false;
  popups = []; shake = 0; caughtFlash = 0;
  resetBoss();
  state = S.PLAY;
}

// ============ 输入（鼠标+触屏+键盘） ============
function press(e) {
  if (e) e.preventDefault();
  if (state === S.TITLE) { startGame(); return; }
  if (state === S.OVER) {
    if (t - overAt > 30) { state = S.TITLE; }
    return;
  }
  slacking = true;
}
function release(e) {
  if (e) e.preventDefault();
  slacking = false;
}
canvas.addEventListener('mousedown', press);
canvas.addEventListener('mouseup', release);
canvas.addEventListener('mouseleave', release);
canvas.addEventListener('touchstart', press, { passive: false });
canvas.addEventListener('touchend', release, { passive: false });
canvas.addEventListener('touchcancel', release, { passive: false });
window.addEventListener('keydown', e => { if (e.code === 'Space') press(e); });
window.addEventListener('keyup',   e => { if (e.code === 'Space') release(e); });

// ============ 像素画笔 ============
function px(x, y, w, h, color) { ctx.fillStyle = color; ctx.fillRect(x | 0, y | 0, w, h); }

function drawText(str, x, y, size, color, align = 'center') {
  ctx.fillStyle = color;
  ctx.font = `bold ${size}px "Courier New", monospace`;
  ctx.textAlign = align;
  ctx.textBaseline = 'top';
  ctx.fillText(str, x, y);
}

// ============ 场景绘制 ============
function drawOffice() {
  px(0, 0, LW, LH, C.wall);
  // 墙面砖缝
  for (let y = 0; y < 130; y += 16)
    for (let x = (y / 16 % 2) * 12; x < LW; x += 24)
      px(x, y, 11, 15, C.wallLight);
  // 地板
  px(0, 130, LW, LH - 130, C.floor);
  for (let y = 136; y < LH; y += 14) px(0, y, LW, 1, '#c3d0e5');
  // 窗户
  px(16, 20, 52, 40, '#0f5aa8'); px(20, 24, 20, 14, '#73eff7');
  px(44, 24, 20, 14, '#73eff7'); px(20, 42, 20, 14, '#41a6f6'); px(44, 42, 20, 14, '#41a6f6');
  // 挂钟
  px(150, 26, 22, 22, C.white); px(160, 30, 2, 8, C.ink); px(160, 36, 6, 2, C.ink);
  // 标语牌
  px(186, 22, 42, 26, '#b13e53');
  drawText('奋斗', 207, 28, 12, C.white);
}

// 打工人（主角，坐在下方工位）
function drawPlayer() {
  const bx = 60, by = 190;      // 基准点
  const bob = (t >> 4) % 2;     // 呼吸起伏
  // 桌子
  px(bx - 24, by + 44, 100, 10, C.deskTop);
  px(bx - 24, by + 54, 100, 30, C.desk);
  // 显示器
  px(bx + 30, by + 16, 34, 26, '#333c57');
  px(bx + 33, by + 19, 28, 20, slacking ? C.screenOff : C.screenOn);
  if (!slacking) { px(bx + 35, by + 23, 16, 2, C.ink); px(bx + 35, by + 27, 22, 2, C.ink); px(bx + 35, by + 31, 12, 2, C.ink); }
  px(bx + 44, by + 42, 6, 4, '#333c57');
  // 身体
  px(bx, by + 20 - bob, 26, 26, C.shirt);
  // 头
  px(bx + 3, by - 2 - bob, 20, 22, C.skin);
  px(bx + 3, by - 6 - bob, 20, 8, C.hair);
  // 眼睛（摸鱼时眼睛往下看手机）
  if (slacking) { px(bx + 8, by + 10 - bob, 3, 2, C.ink); px(bx + 16, by + 10 - bob, 3, 2, C.ink); }
  else { px(bx + 8, by + 7 - bob, 3, 3, C.ink); px(bx + 16, by + 7 - bob, 3, 3, C.ink); }
  if (slacking) {
    // 手机 + 偷笑
    px(bx + 6, by + 26 - bob, 14, 20, C.phone);
    px(bx + 8, by + 28 - bob, 10, 14, C.phoneScr);
    px(bx + 10, by + 16 - bob, 8, 2, C.danger); // 咧嘴笑
    // 手机光晕
    if ((t >> 3) % 2) px(bx + 8 + Math.random() * 6, by + 24 - bob, 2, 2, C.phoneScr);
  } else {
    // 敲键盘的手
    const hx = (t >> 3) % 2 ? 0 : 3;
    px(bx + 28 + hx, by + 40, 8, 6, C.skin);
    px(bx + 44 - hx, by + 40, 8, 6, C.skin);
  }
}

// 老板（上方，背对/回头）
function drawBoss() {
  const bx = 158, by = 78;
  const watching = boss.state === 'watch';
  const warning = boss.state === 'warn';
  const lean = warning ? Math.sin(t * 0.5) * 2 : 0;
  // 老板办公桌
  px(bx - 16, by + 50, 84, 8, '#5d3a2e');
  px(bx - 16, by + 58, 84, 22, '#4a2e24');
  // 身体（西装）
  px(bx, by + 18, 30, 34, C.bossSuit);
  px(bx + 12, by + 22, 6, 12, watching ? '#b13e53' : C.bossSuit); // 领带只有正面可见
  // 头
  px(bx + 4 + lean, by - 4, 22, 24, C.bossSkin);
  if (watching) {
    // 正脸：怒目
    px(bx + 4 + lean, by - 8, 22, 7, C.bossHair);
    px(bx + 8 + lean, by + 4, 5, 4, C.ink);
    px(bx + 17 + lean, by + 4, 5, 4, C.ink);
    px(bx + 7 + lean, by + 1, 7, 2, C.danger);  // 皱眉
    px(bx + 16 + lean, by + 1, 7, 2, C.danger);
    px(bx + 11 + lean, by + 13, 8, 3, C.danger); // 嘴
  } else {
    // 后脑勺
    px(bx + 4 + lean, by - 8, 22, 18, C.bossHair);
  }
  // 预警感叹号
  if (warning && (t >> 2) % 2) {
    px(bx + 10, by - 30, 8, 14, C.warn);
    px(bx + 10, by - 13, 8, 5, C.warn);
  }
  // 盯人视线
  if (watching) {
    ctx.globalAlpha = 0.25 + 0.1 * Math.sin(t * 0.3);
    ctx.fillStyle = C.danger;
    ctx.beginPath();
    ctx.moveTo(bx + 15, by + 8);
    ctx.lineTo(40, 200); ctx.lineTo(120, 220);
    ctx.closePath(); ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function drawHUD() {
  // 分数
  drawText('摸鱼分', 10, 8, 10, C.gray, 'left');
  drawText(String(score), 10, 20, 18, C.gold, 'left');
  // 命（咖啡杯）
  for (let i = 0; i < 3; i++) {
    const x = LW - 18 - i * 18, alive = i < lives;
    px(x, 10, 12, 12, alive ? C.white : '#3b4a78');
    px(x + 12, 12, 3, 6, alive ? C.white : '#3b4a78');
    if (alive) px(x + 2, 6, 8, 3, C.gray);
  }
  // 摸鱼中提示
  if (state === S.PLAY && slacking && boss.state !== 'watch') {
    drawText('+摸鱼中+', 120, 296, 10, C.green);
  }
  if (state === S.PLAY && !slacking) {
    drawText(isTouch ? '按住屏幕摸鱼' : '按住空格/鼠标摸鱼', 120, 296, 10, C.gray);
  }
}

// ============ 主循环 ============
const isTouch = 'ontouchstart' in window;
let overAt = 0;

function update() {
  t++;
  if (state !== S.PLAY) return;

  // 摸鱼得分
  if (slacking && boss.state !== 'watch') {
    if (t % 6 === 0) {
      score++;
      if (t % 30 === 0) popups.push({ x: 60 + Math.random() * 30, y: 200, life: 40, txt: '+5', color: C.green });
    }
  }

  // 老板状态机
  boss.timer++;
  if (boss.state === 'work' && boss.timer > boss.next) {
    boss.state = 'warn'; boss.timer = 0;
    // 预警时间随分数缩短（越来越难）
    boss.warnLen = Math.max(18, 45 - score / 15);
  } else if (boss.state === 'warn' && boss.timer > boss.warnLen) {
    boss.state = 'watch'; boss.timer = 0;
    boss.watchLen = 60 + Math.random() * 80;
    boss.punished = false;
  } else if (boss.state === 'watch') {
    // 被抓判定
    if (slacking && !boss.punished) {
      boss.punished = true;
      lives--; shake = 7; caughtFlash = 20;
      popups.push({ x: 120, y: 160, life: 60, txt: '被抓了!', color: C.danger });
      if (navigator.vibrate) navigator.vibrate(120);
      if (lives <= 0) { state = S.OVER; overAt = t; shake = 0; caughtFlash = 0;
        if (score > best) { best = score; localStorage.setItem('moyu_best', best); }
      }
    }
    if (boss.timer > boss.watchLen) resetBoss();
  }

  popups.forEach(p => { p.y -= 0.6; p.life--; });
  popups = popups.filter(p => p.life > 0);
  if (shake > 0) shake--;
  if (caughtFlash > 0) caughtFlash--;
}

function draw() {
  ctx.save();
  if (shake > 0) ctx.translate((Math.random() - 0.5) * shake * 0.6, (Math.random() - 0.5) * shake * 0.6);

  drawOffice();
  drawBoss();
  drawPlayer();

  // 飘字
  popups.forEach(p => {
    ctx.globalAlpha = Math.min(1, p.life / 20);
    drawText(p.txt, p.x, p.y, 12, p.color);
    ctx.globalAlpha = 1;
  });

  drawHUD();

  // 被抓红闪
  if (caughtFlash > 0) {
    ctx.globalAlpha = caughtFlash / 20 * 0.35;
    px(0, 0, LW, LH, C.danger);
    ctx.globalAlpha = 1;
  }

  if (state === S.TITLE) {
    ctx.globalAlpha = 0.75; px(0, 0, LW, LH, C.ink); ctx.globalAlpha = 1;
    drawText('摸 鱼 快 跑', 120, 90, 24, C.gold);
    drawText('MOYU RUN', 120, 120, 10, C.gray);
    px(70, 140, 100, 2, C.wallLight);
    drawText('老板背对时 → 放心摸鱼', 120, 158, 11, C.white);
    drawText('老板回头前 → 有"!"预警', 120, 176, 11, C.warn);
    drawText('被抓 3 次 → 请去财务结算', 120, 194, 11, C.danger);
    if ((t >> 4) % 2) drawText(isTouch ? '点击屏幕开始' : '点击/空格 开始', 120, 240, 13, C.green);
    if (best > 0) drawText('最高摸鱼分: ' + best, 120, 270, 10, C.gray);
  }

  if (state === S.OVER) {
    ctx.globalAlpha = 0.8; px(0, 0, LW, LH, C.ink); ctx.globalAlpha = 1;
    drawText('你被开除了', 120, 84, 22, C.danger);
    drawText('本次摸鱼分', 120, 130, 11, C.gray);
    drawText(String(score), 120, 146, 26, C.gold);
    if (score >= best && score > 0) drawText('★ 新纪录 ★', 120, 182, 12, C.warn);
    else drawText('最高纪录: ' + best, 120, 182, 11, C.gray);
    const rank = score >= 500 ? '摸鱼宗师' : score >= 300 ? '带薪如厕高手' : score >= 150 ? '茶水间常客' : '摸鱼学徒';
    drawText('称号: ' + rank, 120, 204, 12, C.white);
    if (t - overAt > 30 && (t >> 4) % 2) drawText('点击再来一局', 120, 250, 12, C.green);
  }

  ctx.restore();
}

(function loop() { update(); draw(); requestAnimationFrame(loop); })();
</script>
</body>
</html>
